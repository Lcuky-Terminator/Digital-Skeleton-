<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Blue Skeleton Laser</title>
    <meta name="description"
        content="Interactive hand-tracking laser drawing app using AI-powered gesture recognition. Draw neon trails in the air with your hands.">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --laser-red: #ff0000;
            --selection-yellow: #ffff00;
            --dark-bg: #000000;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        #input_video {
            position: absolute;
            visibility: hidden;
            width: 1px;
            height: 1px;
            transform: scaleX(-1);
        }

        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5;
            transform: scaleX(-1);
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 24px;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid #111;
            border-top: 3px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3), inset 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .loading-text {
            color: var(--neon-blue);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.7;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        /* ─── Toolbar ─── */
        #toolbar {
            position: fixed;
            top: 50%;
            left: 16px;
            transform: translateY(-50%);
            z-index: 60;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(5, 5, 20, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 16px;
            padding: 14px 10px;
            backdrop-filter: blur(16px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.06), 0 8px 32px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        #toolbar.visible {
            opacity: 1;
            pointer-events: all;
        }

        .tb-section-label {
            color: rgba(0, 242, 255, 0.5);
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            padding: 4px 0 2px;
            user-select: none;
        }

        .tb-divider {
            width: 100%;
            height: 1px;
            background: rgba(0, 242, 255, 0.1);
            margin: 4px 0;
        }

        /* Color swatches */
        .tb-colors {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            padding: 2px;
        }

        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .color-swatch:hover {
            transform: scale(1.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .color-swatch.active {
            border-color: #fff;
            box-shadow: 0 0 12px var(--swatch-glow, rgba(255, 255, 255, 0.4));
        }

        .color-swatch.active::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 11px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Custom color */
        .custom-color-wrap {
            display: flex;
            justify-content: center;
            padding: 2px 0;
        }

        #custom-color-input {
            width: 86px;
            height: 26px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            padding: 0;
            -webkit-appearance: none;
        }

        #custom-color-input::-webkit-color-swatch-wrapper {
            padding: 2px;
        }

        #custom-color-input::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }

        /* Brush types */
        .tb-brushes {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brush-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 7px 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.55);
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .brush-btn:hover {
            background: rgba(0, 242, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
        }

        .brush-btn.active {
            background: rgba(0, 242, 255, 0.12);
            border-color: rgba(0, 242, 255, 0.35);
            color: var(--neon-blue);
        }

        .brush-icon {
            font-size: 14px;
            width: 18px;
            text-align: center;
        }

        /* Thickness slider */
        .tb-thickness {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 2px 4px;
        }

        .thickness-value {
            color: var(--neon-blue);
            font-size: 13px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        #thickness-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 82px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            cursor: pointer;
        }

        #thickness-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--neon-blue);
            border: 2px solid rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        #thickness-slider::-webkit-slider-thumb:hover {
            box-shadow: 0 0 16px rgba(0, 242, 255, 0.8);
        }

        #thickness-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--neon-blue);
            border: 2px solid rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
            cursor: pointer;
        }

        /* Clear button */
        .tb-clear-btn {
            padding: 7px 10px;
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.2);
            border-radius: 8px;
            color: #ff6b6b;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .tb-clear-btn:hover {
            background: rgba(255, 50, 50, 0.2);
            border-color: rgba(255, 50, 50, 0.4);
            color: #ff4444;
        }

        /* Instructions overlay */
        #instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: flex;
            gap: 20px;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        #instructions.visible {
            opacity: 1;
        }

        .instruction-card {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 12px;
            padding: 12px 20px;
            color: #fff;
            font-size: 13px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.05);
        }

        .instruction-icon {
            font-size: 20px;
        }

        .instruction-label {
            color: var(--neon-blue);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .instruction-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <div class="loading-text">Initializing Hand Tracking</div>
    </div>

    <!-- ─── Toolbar ─── -->
    <div id="toolbar">
        <div class="tb-section-label">Color</div>
        <div class="tb-colors" id="color-palette">
            <div class="color-swatch active" data-color="#ff0000"
                style="background:#ff0000; --swatch-glow:rgba(255,0,0,0.5);" title="Red"></div>
            <div class="color-swatch" data-color="#00f2ff"
                style="background:#00f2ff; --swatch-glow:rgba(0,242,255,0.5);" title="Cyan"></div>
            <div class="color-swatch" data-color="#00ff66"
                style="background:#00ff66; --swatch-glow:rgba(0,255,102,0.5);" title="Green"></div>
            <div class="color-swatch" data-color="#ff00ff"
                style="background:#ff00ff; --swatch-glow:rgba(255,0,255,0.5);" title="Magenta"></div>
            <div class="color-swatch" data-color="#ffaa00"
                style="background:#ffaa00; --swatch-glow:rgba(255,170,0,0.5);" title="Orange"></div>
            <div class="color-swatch" data-color="#ffffff"
                style="background:#ffffff; --swatch-glow:rgba(255,255,255,0.5);" title="White"></div>
        </div>
        <div class="custom-color-wrap">
            <input type="color" id="custom-color-input" value="#ff0000" title="Pick custom color">
        </div>

        <div class="tb-divider"></div>

        <div class="tb-section-label">Brush</div>
        <div class="tb-brushes" id="brush-palette">
            <button class="brush-btn active" data-brush="laser">
                <span class="brush-icon">⚡</span> Laser
            </button>
            <button class="brush-btn" data-brush="neon">
                <span class="brush-icon">💡</span> Neon
            </button>
            <button class="brush-btn" data-brush="dotted">
                <span class="brush-icon">⬤</span> Dotted
            </button>
            <button class="brush-btn" data-brush="rainbow">
                <span class="brush-icon">🌈</span> Rainbow
            </button>
        </div>

        <div class="tb-divider"></div>

        <div class="tb-section-label">Size</div>
        <div class="tb-thickness">
            <span class="thickness-value" id="thickness-display">5</span>
            <input type="range" id="thickness-slider" min="1" max="20" value="5">
        </div>

        <div class="tb-divider"></div>

        <button class="tb-clear-btn" id="clear-btn">🗑 Clear All</button>
    </div>

    <div id="instructions">
        <div class="instruction-card">
            <span class="instruction-icon">☝️</span>
            <div>
                <div class="instruction-label">Draw</div>
                <div class="instruction-desc">Point index finger up</div>
            </div>
        </div>
        <div class="instruction-card">
            <span class="instruction-icon">🤏</span>
            <div>
                <div class="instruction-label">Move</div>
                <div class="instruction-desc">Pinch to drag drawings</div>
            </div>
        </div>
    </div>

    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script>
        // ─── DOM Elements ───
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading-screen');
        const instructionsEl = document.getElementById('instructions');
        const toolbar = document.getElementById('toolbar');
        const thicknessSlider = document.getElementById('thickness-slider');
        const thicknessDisplay = document.getElementById('thickness-display');
        const customColorInput = document.getElementById('custom-color-input');
        const clearBtn = document.getElementById('clear-btn');

        // ─── Drawing Settings ───
        let activeColor = '#ff0000';
        let activeBrush = 'laser';    // laser | neon | dotted | rainbow
        let activeThickness = 5;
        let rainbowHue = 0;

        // ─── State ───
        let drawings = [];
        let particles = [];
        let currentPath = null;
        let selectedDrawing = null;
        let isDragging = false;
        let lastFingerPos = { x: 0, y: 0 };
        let instructionsShown = false;
        let instructionsTimer = null;

        // ─── Toolbar: Color swatches ───
        document.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.addEventListener('click', () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');
                activeColor = swatch.dataset.color;
                customColorInput.value = activeColor;
            });
        });

        // ─── Toolbar: Custom color ───
        customColorInput.addEventListener('input', (e) => {
            activeColor = e.target.value;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        });

        // ─── Toolbar: Brush buttons ───
        document.querySelectorAll('.brush-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeBrush = btn.dataset.brush;
            });
        });

        // ─── Toolbar: Thickness ───
        thicknessSlider.addEventListener('input', (e) => {
            activeThickness = parseInt(e.target.value);
            thicknessDisplay.textContent = activeThickness;
        });

        // ─── Toolbar: Clear ───
        clearBtn.addEventListener('click', () => {
            drawings = [];
            particles = [];
        });

        // ─── Canvas Setup ───
        function setupCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', setupCanvas);
        setupCanvas();

        // ─── Spark Particle Class ───
        class Spark {
            constructor(x, y, baseColor) {
                this.x = x;
                this.y = y;
                this.baseColor = baseColor;
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 15 + 10;
                this.speedX = Math.cos(angle) * force;
                this.speedY = Math.sin(angle) * force;
                this.life = 1.0;
                this.decay = Math.random() * 0.03 + 0.015;
                this.gravity = 0.45;
                this.friction = 0.96;
            }

            update() {
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
            }

            draw() {
                if (this.life <= 0) return;

                // Parse base color to get spark color tints
                const bc = hexToRgb(this.baseColor);
                let r, g, b;
                if (this.life > 0.8) {
                    // white-hot tint
                    r = Math.min(255, bc.r + 100);
                    g = Math.min(255, bc.g + 100);
                    b = Math.min(255, bc.b + 100);
                } else if (this.life > 0.4) {
                    r = bc.r;
                    g = bc.g;
                    b = bc.b;
                } else {
                    r = Math.floor(bc.r * 0.6);
                    g = Math.floor(bc.g * 0.3);
                    b = Math.floor(bc.b * 0.2);
                }

                canvasCtx.save();
                canvasCtx.globalAlpha = this.life;
                canvasCtx.strokeStyle = `rgb(${r},${g},${b})`;
                canvasCtx.lineWidth = 1.5 * this.life;
                canvasCtx.lineCap = 'round';
                canvasCtx.shadowBlur = 8 * this.life;
                canvasCtx.shadowColor = `rgb(${r},${g},${b})`;

                canvasCtx.beginPath();
                canvasCtx.moveTo(this.x, this.y);
                const tailX = this.x - this.speedX * 0.8;
                const tailY = this.y - this.speedY * 0.8;
                canvasCtx.lineTo(tailX, tailY);
                canvasCtx.stroke();
                canvasCtx.restore();
            }
        }

        // ─── Color Utility ───
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 0, b: 0 };
        }

        function hslToHex(h, s, l) {
            s /= 100; l /= 100;
            const a = s * Math.min(l, 1 - l);
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        function lightenColor(hex, amount) {
            const rgb = hexToRgb(hex);
            const r = Math.min(255, rgb.r + amount);
            const g = Math.min(255, rgb.g + amount);
            const b = Math.min(255, rgb.b + amount);
            return `rgb(${r},${g},${b})`;
        }

        // ─── Utility Functions ───
        function createSparkEffect(x, y, color) {
            const count = Math.floor(Math.random() * 4) + 3;
            for (let i = 0; i < count; i++) {
                particles.push(new Spark(x, y, color));
            }
        }

        function getDistance(p1, p2) {
            return Math.sqrt(
                Math.pow((p1.x - p2.x) * canvasElement.width, 2) +
                Math.pow((p1.y - p2.y) * canvasElement.height, 2)
            );
        }

        function isStrictlyIndexUp(lm) {
            const thumbOpen = getDistance(lm[4], lm[17]) > getDistance(lm[3], lm[17]);
            const indexOpen = lm[8].y < lm[6].y;
            const middleOpen = lm[12].y < lm[10].y;
            const ringOpen = lm[16].y < lm[14].y;
            const pinkyOpen = lm[20].y < lm[18].y;
            return indexOpen && !middleOpen && !ringOpen && !pinkyOpen && !thumbOpen;
        }

        function findDrawingAt(x, y) {
            const padding = 80;
            for (let i = drawings.length - 1; i >= 0; i--) {
                const d = drawings[i];
                for (let p of d.points) {
                    if (Math.hypot(x - p.x, y - p.y) < padding) return d;
                }
            }
            return null;
        }

        // ─── Show Instructions ───
        function showInstructions() {
            if (!instructionsShown) {
                instructionsShown = true;
                instructionsEl.classList.add('visible');
                toolbar.classList.add('visible');
                instructionsTimer = setTimeout(() => {
                    instructionsEl.classList.remove('visible');
                }, 8000);
            }
        }

        // ─── Core: Process Hand Results ───
        function onResults(results) {
            if (loadingScreen.style.display !== 'none') {
                loadingScreen.style.display = 'none';
                showInstructions();
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.fillStyle = '#000000';
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

            drawStoredPaths();
            updateParticles();

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const indexTip = hand[8];
                const thumbTip = hand[4];

                const ix = indexTip.x * canvasElement.width;
                const iy = indexTip.y * canvasElement.height;
                const tx = thumbTip.x * canvasElement.width;
                const ty = thumbTip.y * canvasElement.height;

                const pinchDist = getDistance(hand[4], hand[8]);

                // Drawing mode: index finger pointing up
                if (isStrictlyIndexUp(hand)) {
                    if (!currentPath) {
                        // Capture current settings for this stroke
                        let drawColor = activeColor;
                        if (activeBrush === 'rainbow') {
                            drawColor = hslToHex(rainbowHue, 100, 50);
                        }
                        currentPath = {
                            points: [],
                            id: Date.now(),
                            color: drawColor,
                            brush: activeBrush,
                            thickness: activeThickness
                        };
                        drawings.push(currentPath);
                    }

                    // For rainbow, update color per point
                    let pointColor = currentPath.color;
                    if (activeBrush === 'rainbow') {
                        rainbowHue = (rainbowHue + 3) % 360;
                        pointColor = hslToHex(rainbowHue, 100, 50);
                    }

                    currentPath.points.push({ x: ix, y: iy, color: pointColor });
                    createSparkEffect(ix, iy, pointColor);
                    isDragging = false;
                    selectedDrawing = null;
                }
                // Move mode: pinch gesture
                else if (pinchDist < 45) {
                    const midX = (ix + tx) / 2;
                    const midY = (iy + ty) / 2;

                    if (!isDragging) {
                        selectedDrawing = findDrawingAt(midX, midY);
                        if (selectedDrawing) {
                            isDragging = true;
                            lastFingerPos = { x: midX, y: midY };
                        }
                    }

                    if (isDragging && selectedDrawing) {
                        const dx = midX - lastFingerPos.x;
                        const dy = midY - lastFingerPos.y;
                        selectedDrawing.points.forEach(p => {
                            p.x += dx;
                            p.y += dy;
                        });
                        lastFingerPos = { x: midX, y: midY };
                    }
                    currentPath = null;
                }
                // Idle
                else {
                    currentPath = null;
                    isDragging = false;
                    selectedDrawing = null;
                }

                drawNeonSkeleton(hand);
            } else {
                currentPath = null;
                isDragging = false;
                selectedDrawing = null;
            }
            canvasCtx.restore();
        }

        // ─── Render: Update Particles ───
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        // ─── Render: Draw Stored Laser Paths ───
        function drawStoredPaths() {
            drawings.forEach(d => {
                if (d.points.length < 2) return;

                const isSelected = selectedDrawing && selectedDrawing.id === d.id;
                const brushType = d.brush || 'laser';
                const thickness = d.thickness || 5;
                const baseColor = d.color || '#ff0000';

                canvasCtx.save();
                canvasCtx.lineCap = 'round';
                canvasCtx.lineJoin = 'round';

                if (brushType === 'dotted') {
                    // ── Dotted brush: circles at each point ──
                    d.points.forEach((p, idx) => {
                        const c = p.color || baseColor;
                        canvasCtx.beginPath();
                        canvasCtx.arc(p.x, p.y, thickness * 0.8, 0, Math.PI * 2);
                        canvasCtx.fillStyle = isSelected ? '#ffff00' : c;
                        canvasCtx.shadowBlur = isSelected ? 20 : 12;
                        canvasCtx.shadowColor = isSelected ? '#ffff00' : c;
                        canvasCtx.fill();

                        // Bright core dot
                        canvasCtx.beginPath();
                        canvasCtx.arc(p.x, p.y, thickness * 0.3, 0, Math.PI * 2);
                        canvasCtx.fillStyle = isSelected ? '#fffde7' : lightenColor(c, 120);
                        canvasCtx.shadowBlur = 0;
                        canvasCtx.fill();
                    });
                }
                else if (brushType === 'rainbow') {
                    // ── Rainbow brush: color changes per segment ──
                    for (let i = 1; i < d.points.length; i++) {
                        const segColor = d.points[i].color || baseColor;
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(d.points[i - 1].x, d.points[i - 1].y);
                        canvasCtx.lineTo(d.points[i].x, d.points[i].y);

                        canvasCtx.strokeStyle = isSelected ? '#ffff00' : segColor;
                        canvasCtx.lineWidth = isSelected ? thickness + 3 : thickness;
                        canvasCtx.shadowBlur = isSelected ? 30 : 18;
                        canvasCtx.shadowColor = isSelected ? '#ffff00' : segColor;
                        canvasCtx.stroke();

                        // Core line
                        canvasCtx.strokeStyle = isSelected ? '#fffde7' : lightenColor(segColor, 100);
                        canvasCtx.lineWidth = isSelected ? thickness * 0.5 : thickness * 0.4;
                        canvasCtx.shadowBlur = 0;
                        canvasCtx.stroke();
                    }
                }
                else if (brushType === 'neon') {
                    // ── Neon brush: extra glow layers ──
                    // Wide outer glow
                    canvasCtx.shadowBlur = isSelected ? 45 : 35;
                    canvasCtx.shadowColor = isSelected ? '#ffff00' : baseColor;
                    canvasCtx.strokeStyle = isSelected ? 'rgba(255,255,0,0.3)' : hexToRgbA(baseColor, 0.3);
                    canvasCtx.lineWidth = thickness * 3;
                    drawPath(d.points);

                    // Mid glow
                    canvasCtx.shadowBlur = isSelected ? 25 : 20;
                    canvasCtx.strokeStyle = isSelected ? '#ffff00' : baseColor;
                    canvasCtx.lineWidth = isSelected ? thickness + 3 : thickness;
                    drawPath(d.points);

                    // Bright core
                    canvasCtx.shadowBlur = 0;
                    canvasCtx.strokeStyle = isSelected ? '#fffde7' : '#ffffff';
                    canvasCtx.lineWidth = isSelected ? thickness * 0.5 : thickness * 0.35;
                    drawPath(d.points);
                }
                else {
                    // ── Laser brush (default) ──
                    canvasCtx.shadowBlur = isSelected ? 30 : 15;
                    canvasCtx.shadowColor = isSelected ? '#ffff00' : baseColor;
                    canvasCtx.strokeStyle = isSelected ? '#ffff00' : baseColor;
                    canvasCtx.lineWidth = isSelected ? thickness + 3 : thickness;
                    drawPath(d.points);

                    // Inner bright core
                    canvasCtx.shadowBlur = 0;
                    canvasCtx.strokeStyle = isSelected ? '#fffde7' : '#ffffff';
                    canvasCtx.lineWidth = isSelected ? thickness * 0.5 : thickness * 0.4;
                    drawPath(d.points);
                }

                canvasCtx.restore();
            });
        }

        // ─── Helper: Draw a path from points ───
        function drawPath(points) {
            canvasCtx.beginPath();
            canvasCtx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                canvasCtx.lineTo(points[i].x, points[i].y);
            }
            canvasCtx.stroke();
        }

        // ─── Helper: hex to rgba ───
        function hexToRgbA(hex, alpha) {
            const rgb = hexToRgb(hex);
            return `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
        }

        // ─── Render: Draw Neon Hand Skeleton ───
        function drawNeonSkeleton(landmarks) {
            const blue = '#00f2ff';
            canvasCtx.save();
            canvasCtx.shadowBlur = 15;
            canvasCtx.shadowColor = blue;
            canvasCtx.strokeStyle = blue;
            canvasCtx.lineWidth = 3;

            const connections = [
                [0, 1], [1, 2], [2, 3], [3, 4],
                [0, 5], [5, 6], [6, 7], [7, 8],
                [5, 9], [9, 10], [10, 11], [11, 12],
                [9, 13], [13, 14], [14, 15], [15, 16],
                [13, 17], [17, 18], [18, 19], [19, 20],
                [0, 17]
            ];

            connections.forEach(([a, b]) => {
                canvasCtx.beginPath();
                canvasCtx.moveTo(
                    landmarks[a].x * canvasElement.width,
                    landmarks[a].y * canvasElement.height
                );
                canvasCtx.lineTo(
                    landmarks[b].x * canvasElement.width,
                    landmarks[b].y * canvasElement.height
                );
                canvasCtx.stroke();
            });

            canvasCtx.fillStyle = blue;
            landmarks.forEach(point => {
                canvasCtx.beginPath();
                canvasCtx.arc(
                    point.x * canvasElement.width,
                    point.y * canvasElement.height,
                    4, 0, Math.PI * 2
                );
                canvasCtx.fill();
            });
            canvasCtx.restore();
        }

        // ─── Initialize MediaPipe Hands ───
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.9,
            minTrackingConfidence: 0.9
        });

        hands.onResults(onResults);

        // ─── Initialize Camera ───
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>

</html>
